name: CI

on:
  push:
    branches:
      - '**'

env:
  SNOWFLAKE_CONNECTIONS_ADVANCED_DATA_ENGINEERING_SNOWFLAKE_AUTHENTICATOR: ${{ secrets.SNOWFLAKE_AUTHENTICATOR || 'snowflake' }}

jobs:
  check_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secrets
        run: |
          if [[ '${{ secrets.SNOWFLAKE_AUTHENTICATOR }}' == 'snowflake' ]]; then
            if [[ -z '${{ secrets.SNOWFLAKE_USER }}' || -z '${{ secrets.SNOWFLAKE_PASSWORD }}' ]]; then
              echo 'Error: SNOWFLAKE_USER and SNOWFLAKE_PASSWORD are required.'
              exit 1
            fi
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check_secrets
    steps:
      - name: Run Snow Commands
        run: |
          # Your snow command executions go here
          echo "Deploying to environment based on branch: $TARGET_BRANCH"
          if [[ -n '$TARGET_BRANCH' ]]; then
            export DEPLOY_ENV=$TARGET_BRANCH
          else
            export DEPLOY_ENV='default'
          fi